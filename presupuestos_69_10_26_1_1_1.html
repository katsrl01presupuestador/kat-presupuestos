function renderEstadisticas(){
  const mc = document.getElementById('main-content');
  const fmt    = v => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(v);
  const fmtPct = v => v.toFixed(1)+'%';
  const fmtHs  = v => v.toFixed(1)+' hs';
  const MESES  = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  const costoFijo  = Object.values(hhConfig.conceptos).reduce((s,v)=>s+(+v||0),0);
  const costoHH    = calcCostoHH();
  // Horas necesarias para cubrir el costo fijo mensual
  const hsNecesarias = costoHH > 0 ? costoFijo / costoHH : 0;

  const mesAprobados  = {};
  const mesFacturados = {};

  budgets.forEach(b => {
    const r = calcBudgetRentabilidad(b);
    const hsMO = (b.items||[]).filter(i=>i.type==='mo').reduce((s,i)=>s+(parseFloat(i.qty)||0), 0);

    if(['approved','executed','invoiced'].includes(b.status) && (b.date_approved || b.date)){
      const mesRef = b.date_approved || b.date;
      const mes = mesRef.slice(0,7);
      if(!mesAprobados[mes]) mesAprobados[mes] = {count:0, neto:0, moNeto:0, margenEntradaSum:0, margenSalidaSum:0, hsMO:0, items:[]};
      mesAprobados[mes].count++;
      mesAprobados[mes].neto             += r.neto;
      mesAprobados[mes].moNeto           += r.moNeto;
      mesAprobados[mes].margenEntradaSum += r.margenEntrada;
      mesAprobados[mes].margenSalidaSum  += r.margenSalida;
      mesAprobados[mes].hsMO             += hsMO;
      mesAprobados[mes].items.push({b, r, hsMO});
    }

    if(b.status==='invoiced' && b.date_invoiced){
      const mes = b.date_invoiced.slice(0,7);
      if(!mesFacturados[mes]) mesFacturados[mes] = {count:0, neto:0, cashflow:0, resultado:0, margenEntradaSum:0, margenSalidaSum:0, hsMO:0, items:[]};
      mesFacturados[mes].count++;
      mesFacturados[mes].neto            += r.neto;
      mesFacturados[mes].cashflow        += r.cashflow;
      mesFacturados[mes].resultado       += r.resultado;
      mesFacturados[mes].margenEntradaSum += r.margenEntrada;
      mesFacturados[mes].margenSalidaSum  += r.margenSalida;
      mesFacturados[mes].hsMO            += hsMO;
      mesFacturados[mes].items.push({b, r, hsMO});
    }
  });

  const todosMeses = [...new Set([...Object.keys(mesAprobados), ...Object.keys(mesFacturados)])].sort();
  const totAprob = Object.values(mesAprobados).reduce((s,m)=>({count:s.count+m.count, neto:s.neto+m.neto, moNeto:s.moNeto+m.moNeto, hsMO:s.hsMO+m.hsMO}),{count:0,neto:0,moNeto:0,hsMO:0});
  const totFact  = Object.values(mesFacturados).reduce((s,m)=>({count:s.count+m.count, cashflow:s.cashflow+m.cashflow, resultado:s.resultado+m.resultado, hsMO:s.hsMO+m.hsMO}),{count:0,cashflow:0,resultado:0,hsMO:0});

  const difColor = v => v >= 0 ? 'var(--green)' : 'var(--red)';
  const difLabel = v => (v >= 0 ? '▲ ' : '▼ ') + fmt(Math.abs(v));
  const hsColor  = v => v >= 0 ? 'var(--green)' : 'var(--red)';
  const hsLabel  = v => (v >= 0 ? '▲ ' : '▼ ') + Math.abs(v).toFixed(1) + ' hs';

  const filas = todosMeses.map(m => {
    const ap = mesAprobados[m]  || {count:0, neto:0, moNeto:0, margenEntradaSum:0, margenSalidaSum:0, hsMO:0};
    const fa = mesFacturados[m] || {count:0, cashflow:0, resultado:0, margenEntradaSum:0, margenSalidaSum:0, hsMO:0};
    const [anio, mesNum] = m.split('-');
    const mesNombre = MESES[parseInt(mesNum)-1] + ' ' + anio;

    const mEntAp = ap.count > 0 ? ap.margenEntradaSum/ap.count : 0;
    const mSalAp = ap.count > 0 ? ap.margenSalidaSum/ap.count  : 0;
    const mEntFa = fa.count > 0 ? fa.margenEntradaSum/fa.count : 0;
    const mSalFa = fa.count > 0 ? fa.margenSalidaSum/fa.count  : 0;
    const difAp  = ap.neto - costoFijo;
    const difFa  = fa.cashflow - costoFijo;
    const cEAp = mEntAp>=25?'var(--green)':mEntAp>=10?'var(--accent)':'var(--red)';
    const cSAp = mSalAp>=25?'var(--green)':mSalAp>=10?'var(--accent)':'var(--red)';
    const cEFa = mEntFa>=25?'var(--green)':mEntFa>=10?'var(--accent)':'var(--red)';
    const cSFa = mSalFa>=25?'var(--green)':mSalFa>=10?'var(--accent)':'var(--red)';

    return {mesNombre, ap, fa, mEntAp, mSalAp, mEntFa, mSalFa, difAp, difFa, cEAp, cSAp, cEFa, cSFa};
  });

  const filasRendimiento = filas.map(({mesNombre, ap, fa, mEntAp, mSalAp, mEntFa, mSalFa, difAp, difFa, cEAp, cSAp, cEFa, cSFa}) => {
    // Sub-filas por presupuesto aprobado
    const subRowsAp = (ap.items||[]).map(({b, r}) => {
      const cE = r.margenEntrada>=25?'var(--green)':r.margenEntrada>=10?'var(--accent)':'var(--red)';
      const cS = r.margenSalida>=25?'var(--green)':r.margenSalida>=10?'var(--accent)':'var(--red)';
      const statusLabel = {approved:'Aprobado',executed:'Ejecutado',invoiced:'Facturado'}[b.status]||b.status;
      return `<tr style="border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)">
        <td style="padding:6px 16px 6px 28px;color:var(--text2);font-size:12px">
          <span style="color:var(--text3);font-size:10px;margin-right:6px">#${b.number||b.id.slice(-4)}</span>
          ${b.client?.name||b.description||'Sin descripción'}
          <span style="margin-left:6px;font-size:10px;padding:1px 5px;border-radius:4px;background:var(--surface2);color:var(--text3)">${statusLabel}</span>
        </td>
        <td style="padding:6px 12px;text-align:center;color:var(--text3);font-size:11px">—</td>
        <td style="padding:6px 12px;text-align:right;font-family: var(--font-condensed);font-size:13px;color:var(--blue)">${fmt(r.neto)}</td>
        <td style="padding:6px 12px;text-align:center;font-size:12px;color:${cE}">${fmtPct(r.margenEntrada)}</td>
        <td style="padding:6px 12px;text-align:center;font-size:12px;color:${cS}">${fmtPct(r.margenSalida)}</td>
        <td style="padding:6px 12px;border-right:2px solid var(--border)"></td>
        <td colspan="5"></td>
      </tr>`;
    }).join('');

    // Sub-filas por presupuesto facturado
    const subRowsFa = (fa.items||[]).map(({b, r}) => {
      const cE = r.margenEntrada>=25?'var(--green)':r.margenEntrada>=10?'var(--accent)':'var(--red)';
      const cS = r.margenSalida>=25?'var(--green)':r.margenSalida>=10?'var(--accent)':'var(--red)';
      return `<tr style="border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)">
        <td style="padding:6px 16px 6px 28px;color:var(--text2);font-size:12px">
          <span style="color:var(--text3);font-size:10px;margin-right:6px">#${b.number||b.id.slice(-4)}</span>
          ${b.client?.name||b.description||'Sin descripción'}
        </td>
        <td colspan="5" style="border-right:2px solid var(--border)"></td>
        <td style="padding:6px 12px;text-align:center;color:var(--text3);font-size:11px">—</td>
        <td style="padding:6px 12px;text-align:right;font-family: var(--font-condensed);font-size:13px;color:var(--green)">${fmt(r.cashflow)}</td>
        <td style="padding:6px 12px;text-align:center;font-size:12px;color:${cE}">${fmtPct(r.margenEntrada)}</td>
        <td style="padding:6px 12px;text-align:center;font-size:12px;color:${cS}">${fmtPct(r.margenSalida)}</td>
        <td></td>
      </tr>`;
    }).join('');

    return `
    <tr style="border-bottom:${(ap.count+fa.count)>1?'1px solid var(--border)':'1px solid var(--border)'}">
      <td style="padding:12px 16px;font-weight:700;color:var(--text)">${mesNombre}</td>
      <td style="padding:12px 16px;text-align:center;color:var(--text2)">${ap.count||'—'}</td>
      <td style="padding:12px 16px;text-align:right;font-family: var(--font-condensed);font-size:15px;color:var(--blue)">${ap.count?fmt(ap.neto):'—'}</td>
      <td style="padding:12px 16px;text-align:center;font-weight:700;color:${cEAp}">${ap.count?fmtPct(mEntAp):'—'}</td>
      <td style="padding:12px 16px;text-align:center;font-weight:700;color:${cSAp}">${ap.count?fmtPct(mSalAp):'—'}</td>
      <td style="padding:12px 16px;text-align:right;font-weight:700;color:${difColor(difAp)};border-right:2px solid var(--border)">${ap.count?difLabel(difAp):'—'}</td>
      <td style="padding:12px 16px;text-align:center;color:var(--text2)">${fa.count||'—'}</td>
      <td style="padding:12px 16px;text-align:right;font-family: var(--font-condensed);font-size:15px;color:var(--green)">${fa.count?fmt(fa.cashflow):'—'}</td>
      <td style="padding:12px 16px;text-align:center;font-weight:700;color:${cEFa}">${fa.count?fmtPct(mEntFa):'—'}</td>
      <td style="padding:12px 16px;text-align:center;font-weight:700;color:${cSFa}">${fa.count?fmtPct(mSalFa):'—'}</td>
      <td style="padding:12px 16px;text-align:right;font-weight:700;color:${difColor(difFa)}">${fa.count?difLabel(difFa):'—'}</td>
    </tr>
    ${subRowsAp}${subRowsFa}`;
  }).join('');

  const filasMO = filas.map(({mesNombre, ap}) => {
    const hsTrabajadas = ap.hsMO;
    const difHs  = hsTrabajadas - hsNecesarias;
    const difPesos = difHs * costoHH;
    const cobertura = hsNecesarias > 0 ? (hsTrabajadas / hsNecesarias * 100) : 0;
    const cobColor = cobertura >= 100 ? 'var(--green)' : cobertura >= 70 ? 'var(--accent)' : 'var(--red)';
    const costoHHCobrado = hsTrabajadas > 0 ? ap.moNeto / hsTrabajadas : 0;
    const eficiencia = costoHH > 0 && hsTrabajadas > 0 ? ((costoHHCobrado - costoHH) / costoHH * 100) : 0;
    const efColor = eficiencia >= 0 ? 'var(--green)' : 'var(--red)';

    // Sub-filas individuales por presupuesto
    const subRows = (ap.items||[]).map(({b, r, hsMO:hsItem}) => {
      const hhCob = hsItem > 0 ? r.moNeto / hsItem : 0;
      const efItem = costoHH > 0 && hsItem > 0 ? ((hhCob - costoHH) / costoHH * 100) : 0;
      const efItemColor = efItem >= 0 ? 'var(--green)' : 'var(--red)';
      return `<tr style="border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)">
        <td style="padding:6px 16px 6px 28px;color:var(--text2);font-size:12px">
          <span style="color:var(--text3);font-size:10px;margin-right:6px">#${b.number||b.id.slice(-4)}</span>
          ${b.client?.name||b.description||'Sin descripción'}
        </td>
        <td style="padding:6px 12px;text-align:center;font-size:11px;color:var(--text3)">—</td>
        <td style="padding:6px 12px;text-align:center;font-size:12px;color:var(--text2)">${hsItem>0?fmtHs(hsItem):'—'}</td>
        <td style="padding:6px 12px;text-align:center;font-size:11px;color:var(--text3)">—</td>
        <td style="padding:6px 12px"></td>
        <td style="padding:6px 12px;border-right:2px solid var(--border)"></td>
        <td style="padding:6px 12px;text-align:right;font-size:12px;color:var(--text3)">${hsItem>0?fmt(costoHH):'—'}</td>
        <td style="padding:6px 12px;text-align:right;font-size:12px;color:var(--blue)">${hsItem>0?fmt(hhCob):'—'}</td>
        <td style="padding:6px 12px;text-align:right;font-size:12px;font-weight:700;color:${efItemColor}">${hsItem>0?(efItem>=0?'▲ ':'▼ ')+Math.abs(efItem).toFixed(1)+'%':'—'}</td>
      </tr>`;
    }).join('');

    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:12px 16px;font-weight:700;color:var(--text)">${mesNombre}</td>
      <td style="padding:12px 16px;text-align:center;font-weight:800;color:${cobColor}">${hsTrabajadas>0?fmtPct(cobertura):'—'}</td>
      <td style="padding:12px 16px;text-align:center;color:var(--text2)">${hsTrabajadas>0?fmtHs(hsTrabajadas):'—'}</td>
      <td style="padding:12px 16px;text-align:center;color:var(--text3)">${fmtHs(hsNecesarias)}</td>
      <td style="padding:12px 16px;text-align:right;font-weight:700;color:${hsColor(difHs)}">${hsTrabajadas>0?hsLabel(difHs):'—'}</td>
      <td style="padding:12px 16px;text-align:right;font-weight:700;color:${hsColor(difPesos)};border-right:2px solid var(--border)">${hsTrabajadas>0?difLabel(difPesos):'—'}</td>
      <td style="padding:12px 16px;text-align:right;font-family: var(--font-condensed);font-size:14px;color:var(--text2)">${hsTrabajadas>0?fmt(costoHH):'—'}</td>
      <td style="padding:12px 16px;text-align:right;font-family: var(--font-condensed);font-size:14px;color:var(--blue)">${hsTrabajadas>0?fmt(costoHHCobrado):'—'}</td>
      <td style="padding:12px 16px;text-align:right;font-weight:700;color:${efColor}">${hsTrabajadas>0?(eficiencia>=0?'▲ ':'▼ ')+Math.abs(eficiencia).toFixed(1)+'%':'—'}</td>
    </tr>${subRows}`;
  }).join('');

  mc.innerHTML = `
  <div class="stats-print-header" style="display:none">
    <div class="stats-print-title">📊 Estadísticas — KAT Electricidad</div>
    <div class="stats-print-company">CUIT 30716551551<br>Ratery 132, Mar del Plata</div>
  </div>
  <div class="page-header stats-page-header"><h1 class="page-title">📊 <span>Estadísticas</span></h1><button class="btn btn-ghost no-print" onclick="printLandscape()">🖨️ Imprimir / PDF</button></div>
  <div class="rent-info">📌 <strong>Aprobados</strong>: fecha de aprobación &nbsp;|&nbsp; <strong>Facturados</strong>: fecha de emisión de factura &nbsp;|&nbsp; <strong>Productividad MO</strong>: hs trabajadas (aprobados+facturados del mes) vs hs necesarias para cubrir costo fijo.</div>

  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px">
    <div class="card" style="text-align:center">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Costo fijo mensual</div>
      <div style="font-family: var(--font-condensed);font-size:26px;font-weight:800;color:var(--red)">${fmt(costoFijo)}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">punto de equilibrio</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Hs. necesarias / mes</div>
      <div style="font-family: var(--font-condensed);font-size:26px;font-weight:800;color:var(--accent)">${hsNecesarias.toFixed(0)} hs</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">para cubrir costo fijo</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Presup. aprobados</div>
      <div style="font-family: var(--font-condensed);font-size:36px;font-weight:800;color:var(--accent)">${totAprob.count}</div>
      <div style="font-size:13px;color:var(--blue);margin-top:4px">${fmt(totAprob.neto)}</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Presup. facturados</div>
      <div style="font-family: var(--font-condensed);font-size:36px;font-weight:800;color:#38bdf8">${totFact.count}</div>
      <div style="font-size:13px;color:var(--green);margin-top:4px">${fmt(totFact.cashflow)}</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Resultado neto total</div>
      <div style="font-family: var(--font-condensed);font-size:26px;font-weight:800;color:${totFact.resultado>=0?'var(--green)':'var(--red)'}">${fmt(totFact.resultado)}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">después de impuestos y cargas</div>
    </div>
  </div>

  <div class="card" style="padding:0;overflow:hidden;overflow-x:auto;margin-bottom:24px">
    <div style="padding:14px 16px;background:var(--surface2);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);border-bottom:2px solid var(--border)">
      📈 Rendimiento mensual — Aprobados y Facturados
    </div>
    <table class="stat-table" style="width:100%;border-collapse:collapse;min-width:900px">
      <thead>
        <tr style="background:var(--surface2)">
          <th rowspan="2" style="padding:10px 16px;text-align:left;font-size:11px;color:var(--text3);border-bottom:2px solid var(--border)">Mes</th>
          <th colspan="5" style="padding:8px 16px;text-align:center;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);border-bottom:1px solid var(--border);border-right:2px solid var(--border)">✅ Aprobados</th>
          <th colspan="5" style="padding:8px 16px;text-align:center;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#38bdf8;border-bottom:1px solid var(--border)">🧾 Facturados</th>
        </tr>
        <tr style="background:var(--surface2);border-bottom:2px solid var(--border)">
          <th style="padding:8px 12px;font-size:10px;color:var(--text3);text-align:center">Cant.</th>
          <th style="padding:8px 12px;font-size:10px;color:var(--text3);text-align:right">Neto</th>
          <th style="padding:8px 12px;font-size:10px;color:var(--text3);text-align:center">M.Entrada</th>
          <th style="padding:8px 12px;font-size:10px;color:var(--text3);text-align:center">M.Salida</th>
          <th style="padding:8px 12px;font-size:10px;color:var(--text3);text-align:right;border-right:2px solid var(--border)">vs Costo fijo</th>
          <th style="padding:8px 12px;font-size:10px;color:var(--text3);text-align:center">Cant.</th>
          <th style="padding:8px 12px;font-size:10px;color:var(--text3);text-align:right">Cashflow</th>
          <th style="padding:8px 12px;font-size:10px;color:var(--text3);text-align:center">M.Entrada</th>
          <th style="padding:8px 12px;font-size:10px;color:var(--text3);text-align:center">M.Salida</th>
          <th style="padding:8px 12px;font-size:10px;color:var(--text3);text-align:right">vs Costo fijo</th>
        </tr>
      </thead>
      <tbody>
        ${filasRendimiento || `<tr><td colspan="11" style="padding:40px;text-align:center;color:var(--text3)">No hay datos todavía.</td></tr>`}
      </tbody>
    </table>
  </div>

  <div class="card" style="padding:0;overflow:hidden;overflow-x:auto">
    <div style="padding:14px 16px;background:rgba(167,139,250,.08);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#a78bfa;border-bottom:2px solid var(--border)">
      👷 Productividad Mano de Obra — por mes (presupuestos aprobados)
    </div>
    <div style="padding:10px 16px;background:rgba(167,139,250,.04);border-bottom:1px solid var(--border);font-size:12px;color:var(--text3)">
      Hs. necesarias para cubrir costo fijo: <strong style="color:#a78bfa">${hsNecesarias.toFixed(0)} hs/mes</strong>
      &nbsp;·&nbsp; Costo HH real: <strong style="color:#a78bfa">${fmt(costoHH)}</strong>/hs
    </div>
    <table class="stat-table" style="width:100%;border-collapse:collapse;min-width:800px">
      <thead>
        <tr style="background:rgba(167,139,250,.06);border-bottom:2px solid var(--border)">
          <th style="padding:10px 16px;text-align:left;font-size:10px;color:var(--text3)">Mes</th>
          <th style="padding:10px 12px;font-size:10px;color:#a78bfa;text-align:center">Cobertura</th>
          <th style="padding:10px 12px;font-size:10px;color:#a78bfa;text-align:center">Hs. trabajadas</th>
          <th style="padding:10px 12px;font-size:10px;color:var(--text3);text-align:center">Hs. necesarias</th>
          <th style="padding:10px 12px;font-size:10px;color:#a78bfa;text-align:right">Dif. hs</th>
          <th style="padding:10px 12px;font-size:10px;color:#a78bfa;text-align:right;border-right:2px solid var(--border)">Dif. $</th>
          <th style="padding:10px 12px;font-size:10px;color:var(--text3);text-align:right">HH costo real</th>
          <th style="padding:10px 12px;font-size:10px;color:var(--blue);text-align:right">HH cobrada</th>
          <th style="padding:10px 12px;font-size:10px;color:#a78bfa;text-align:right">Eficiencia MO</th>
        </tr>
      </thead>
      <tbody>
        ${filasMO || `<tr><td colspan="9" style="padding:40px;text-align:center;color:var(--text3)">No hay datos todavía.</td></tr>`}
      </tbody>
    </table>
    <div style="padding:10px 16px;background:rgba(167,139,250,.04);border-top:1px solid var(--border);font-size:11px;color:var(--text3)">
      💡 <strong>Eficiencia MO</strong>: diferencia entre el precio de hora cobrado al cliente (neto MO / hs) vs el costo real de la hora (costo fijo / horas disponibles).
      Positivo ▲ = cobrás más de lo que te cuesta. Negativo ▼ = subsidiás al cliente.
    </div>

let voiceRecognition=null, voiceActive=false;

function toggleVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    alert('Tu navegador no soporta reconocimiento de voz.\nUsá Google Chrome para esta función.');
    return;
  }
  if(voiceActive){stopVoice();return;}
  startVoice();
}

function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  voiceRecognition=new SR();
  voiceRecognition.lang='es-AR'; voiceRecognition.continuous=false; voiceRecognition.interimResults=true;
  const btn=document.getElementById('mic-btn');
  const status=document.getElementById('voice-status');
  if(btn){btn.style.borderColor='var(--red)';btn.style.color='var(--red)';btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg> 🔴 Escuchando...';}
  if(status){status.style.display='block';status.textContent='🎙 Escuchando... Podés decir: "instalación tablero, 8 horas, margen 30%"';}
  voiceActive=true;
  voiceRecognition.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join(' ').toLowerCase();
    if(status)status.textContent='🎙 Escuché: "'+t+'"';
    if(e.results[0].isFinal)procesarVoz(t);
  };
  voiceRecognition.onerror=e=>{
    if(status)status.textContent='❌ Error: '+(e.error==='not-allowed'?'Permiso de micrófono denegado.':e.error);
    stopVoice();
  };
  voiceRecognition.onend=()=>stopVoice();
  voiceRecognition.start();
}

function stopVoice(){
  voiceActive=false;
  if(voiceRecognition)voiceRecognition.stop();
  const btn=document.getElementById('mic-btn');
  if(btn){btn.style.borderColor='';btn.style.color='';btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg> Dictado por voz';}
}

function procesarVoz(texto){
  const status=document.getElementById('voice-status');
  let desc='',horas=null,margen=null,tipo='mo',precio=null,cantidad=null;
  if(/material|cable|caño|tubo|tablero|disyuntor|llave|tomacorriente|interruptor/.test(texto))tipo='mat';
  let dM=texto.match(/^(.+?)(?:\s+(?:de\s+)?\d|\s+(?:hora|margen|precio|cantidad|pesos))/);
  if(dM)desc=dM[1].trim(); else desc=texto.replace(/\d[\d.,]*/g,'').replace(/\s+/g,' ').trim();
  let hM=texto.match(/(\d+[\d.,]*)\s*(?:hora|hs|h\b)/);
  if(hM)horas=parseFloat(hM[1].replace(',','.'));
  let mM=texto.match(/margen\s+(?:de\s+)?(\d+[\d.,]*)\s*%?/);
  if(!mM)mM=texto.match(/(\d+[\d.,]*)\s*%\s*(?:de\s+)?margen/);
  if(mM)margen=parseFloat(mM[1].replace(',','.'));
  let pM=texto.match(/(?:precio|costo)\s+(?:de\s+)?(\d+[\d.,]*)/);
  if(pM)precio=parseFloat(pM[1].replace(/[.,]/g,''));
  let cM=texto.match(/(\d+)\s*(?:unidad|unidades|piezas|pieza|metros?|rollos?)/);
  if(cM)cantidad=parseInt(cM[1]);
  const item={desc:desc.charAt(0).toUpperCase()+desc.slice(1),type:tipo,mode:'cost',
    cost:precio||(tipo==='mo'?(hhConfig.costoGuardado||0):0),margin:margen||30,price:0,qty:horas||cantidad||1};
  currentBudget.items.push(item); save(); renderForm();
  if(status){status.textContent='✅ Agregado: "'+item.desc+'" | '+item.qty+(tipo==='mo'?' hs':' u.')+' | margen '+item.margin+'% | costo $'+item.cost;
    setTimeout(()=>{if(status)status.style.display='none';},4000);}
}

function parsearLineaMaterial(line){
  line = line.trim();
  if(!line) return null;
  line = line.replace(/^[-*\u2022\u00b7]\s*/, '').replace(/^\d+\.\s+/, '').trim();
  if(!line) return null;
  let qty = 1, desc = line, m;
  m = line.match(/^(\d+[\d.,]*)\s+(.+)/);
  if(m){ return {qty: parseFloat(m[1].replace(',','.')), desc: m[2].trim()}; }
  m = line.match(/^(.+?)\s+[xX\u00d7]\s*(\d+[\d.,]*)\s*(?:unidades?|piezas?|u\.?|metros?|m\.?|rollos?)?$/i);
  if(m){ return {qty: parseFloat(m[2].replace(',','.')), desc: m[1].trim()}; }
  m = line.match(/^(.+?)\s*[-\u2013:]\s*(\d+[\d.,]*)\s*(?:unidades?|piezas?|u\.?|metros?|m\.?|rollos?)?$/i);
  if(m && parseFloat(m[2]) > 0 && parseFloat(m[2]) < 10000){ return {qty: parseFloat(m[2].replace(',','.')), desc: m[1].trim()}; }
  m = line.match(/^(.+?)\s*\((\d+[\d.,]*)\)$/);
  if(m){ return {qty: parseFloat(m[2].replace(',','.')), desc: m[1].trim()}; }
  m = line.match(/^(.+?)\s+(\d+[\d.,]*)$/);
  if(m && parseFloat(m[2]) > 0 && parseFloat(m[2]) < 10000 && isNaN(parseFloat(m[1]))){ return {qty: parseFloat(m[2].replace(',','.')), desc: m[1].trim()}; }
  return { qty: 1, desc };
}

function importarMatDesdeExcel(gi, input){
  const file = input.files[0];
  if(!file) return;
  input.value = '';
  const isCSV = file.name.toLowerCase().endsWith('.csv') || file.type.includes('csv');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let items = [];
      if(isCSV){
        const lines = e.target.result.split('\n').filter(l=>l.trim());
        const start = isNaN(parseFloat(lines[0].split(/[,;\t]/)[0])) ? 1 : 0;
        for(let i=start; i<lines.length; i++){
          const parsed = parsearLineaMaterial(lines[i].split(/[,;\t]/).map(c=>c.trim().replace(/^"|"$/g,'')).join(' '));
          if(parsed) items.push(parsed);
        }
      } else {
        if(typeof XLSX === 'undefined'){ alert('SheetJS no disponible. Usa CSV o texto plano.'); return; }
        const wb = XLSX.read(e.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        const startRow = data.length && typeof data[0][0]==='string' && isNaN(parseFloat(data[0][0])) ? 1 : 0;
        for(let i=startRow; i<data.length; i++){
          const parsed = parsearLineaMaterial(data[i].filter(c=>c!=='').join(' '));
          if(parsed && parsed.desc) items.push(parsed);
        }
      }
      if(!items.length){ alert('No se encontraron materiales en el archivo.'); return; }
      const item = currentBudget.items[gi];
      if(!item.matDetalles) item.matDetalles = [];
      items.forEach(i => item.matDetalles.push({desc: i.desc, qty: i.qty}));
      save();
      const rowsEl = document.getElementById('mat-det-rows-'+gi);
      if(rowsEl) rowsEl.innerHTML = renderMatDetalleRows(gi);
      alert('Se importaron '+items.length+' material'+(items.length!==1?'es':'')+' desde el archivo.');
    } catch(err){ alert('Error al leer el archivo: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
  if(isCSV) reader.readAsText(file, 'UTF-8'); else reader.readAsArrayBuffer(file);
}


async function importarMatDesdePDF(gi, input){
  const file = input.files[0];
  if(!file) return;
  input.value = '';

  const rowsEl = document.getElementById('mat-det-rows-'+gi);
  if(rowsEl) rowsEl.innerHTML = '<div style="padding:12px;color:var(--blue);font-size:13px">⏳ Extrayendo texto del PDF...</div>';

  // Extract text with pdf.js
  let fullText = '';
  try {
    if(typeof pdfjsLib === 'undefined') throw new Error('pdf.js no disponible. Necesitas internet la primera vez para cargarlo.');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    for(let p = 1; p <= pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const tc   = await page.getTextContent();
      let lastY  = null;
      for(const it of tc.items){
        if(lastY !== null && Math.abs(it.transform[5] - lastY) > 5) fullText += '\n';
        fullText += it.str;
        lastY = it.transform[5];
      }
      fullText += '\n';
    }
  } catch(e){
    if(rowsEl) rowsEl.innerHTML = renderMatDetalleRows(gi);
    alert('No se pudo leer el PDF: ' + e.message);
    return;
  }

  if(!fullText.trim()){
    if(rowsEl) rowsEl.innerHTML = renderMatDetalleRows(gi);
    alert('El PDF no tiene texto extraible (puede ser imagen escaneada). Copia el texto manualmente y usa el boton Importar lista.');
    return;
  }

  // Show extracted text in the import panel for manual review
  // Open the text import panel and pre-fill it with the PDF text
  const importPanel = document.getElementById('mat-import-panel-'+gi);
  const ta = document.getElementById('mat-import-text-'+gi);
  if(!importPanel || !ta){
    if(rowsEl) rowsEl.innerHTML = renderMatDetalleRows(gi);
    return;
  }

  // Clean up the text a bit: remove obvious price/tax lines
  const skipPatterns = [
    /^\d+[.,]\d{2}\s*$/,
    /^[.,\d\s]+$/,
    /^(IVA|iva|Subtotal|SUBTOTAL|Total|TOTAL|USD|ARS|EUR)/,
    /^\d+\s*%\s*$/,
    /^(0,00|0\.00)$/,
    /^[A-Z]{2,4}\s*$/,
  ];
  const cleanLines = fullText
    .split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 2 && !skipPatterns.some(p => p.test(l)));

  ta.value = cleanLines.join('\n');
  importPanel.style.display = 'block';

  // Update the panel title to indicate it came from PDF
  const panelTitle = importPanel.querySelector('.mat-import-panel div');
  if(panelTitle) panelTitle.innerHTML = '&#128196; Texto extraido del PDF — <strong>revisá y eliminá lo que no sea material</strong> antes de importar';

  if(rowsEl) rowsEl.innerHTML = renderMatDetalleRows(gi);

  // Scroll to the panel
  importPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function exportarPresupuestoExcel(){
  const b = currentBudget;
  if(!b){ alert('No hay presupuesto abierto.'); return; }

  const statusLabel = {pending:'Pendiente',approved:'Aprobado',rejected:'Rechazado',executed:'Ejecutado',invoiced:'Facturado'};
  const t = calcTotals(b.items||[]);
  const dc = diasEnAprobado(b);
  const wb = XLSX.utils.book_new();

  // ── Hoja 1: Encabezado / resumen ──
  const wsEnc = XLSX.utils.aoa_to_sheet([
    ['PRESUPUESTO', b.number],
    ['Fecha', b.date],
    ['Validez (días)', b.validity || 15],
    ['Estado', statusLabel[b.status] || b.status],
    ['Días en aprobado', dc ? dc.dias : '—'],
    ['Descripción', b.description || ''],
    [],
    ['DATOS CLIENTE'],
    ['Razón social', b.client?.name || ''],
    ['CUIT', b.client?.cuit || ''],
    ['Dirección', b.client?.address || ''],
    ['Condición IVA', b.client?.condition || ''],
    [],
    ['CONDICIONES'],
    ['Moneda', b.currency || 'ARS'],
    ['Plazo de pago', b.paymentDays === 0 ? 'Contado' : b.paymentDays === -1 ? 'A convenir' : (b.paymentDays||30)+' días'],
    ['Anticipo (%)', b.anticipo || 0],
    [],
    ['EMPRESA EMISORA'],
    ['Nombre', COMPANY.name],
    ['CUIT', COMPANY.cuit],
    ['Dirección', COMPANY.address],
    ['Teléfono', COMPANY.phone],
    [],
    ['TOTALES'],
    ['Neto', t.neto],
    ['IVA 21%', t.iva],
    ['TOTAL c/IVA', t.total],
  ]);
  wsEnc['!cols'] = [{wch:22},{wch:42}];
  XLSX.utils.book_append_sheet(wb, wsEnc, 'Resumen');

  // ── Hoja 2: Ítems Mano de Obra ──
  const moItems = (b.items||[]).filter(i=>i.type==='mo');
  if(moItems.length){
    const moHeaders = ['Descripción','Modo','Costo HH','Margen (%)','Precio venta','Horas','Subtotal'];
    const moRows = moItems.map(item => {
      const sp = salePrice(item);
      const mp = marginPct(item);
      return [item.desc||'', item.mode==='cost'?'Costo+margen':'Precio directo',
        parseFloat(item.cost)||0, Math.round(mp*100)/100,
        Math.round(sp*100)/100, parseFloat(item.qty)||0,
        Math.round(subtotal(item)*100)/100];
    });
    const moTot = moItems.reduce((s,i)=>s+subtotal(i),0);
    moRows.push([]);
    moRows.push(['','','','','','SUBTOTAL MO', Math.round(moTot*100)/100]);
    const wsMO = XLSX.utils.aoa_to_sheet([moHeaders,...moRows]);
    wsMO['!cols'] = [{wch:40},{wch:16},{wch:12},{wch:12},{wch:14},{wch:8},{wch:14}];
    XLSX.utils.book_append_sheet(wb, wsMO, 'Mano de Obra');
  }

  // ── Hoja 3: Ítems Materiales ──
  const matItems = (b.items||[]).filter(i=>i.type==='mat');
  if(matItems.length){
    const matHeaders = ['Descripción','Modo','Costo unit.','Margen (%)','Precio venta','Cantidad','Subtotal'];
    const matRows = matItems.map(item => {
      const sp = salePrice(item);
      const mp = marginPct(item);
      return [item.desc||'', item.mode==='cost'?'Costo+margen':'Precio directo',
        parseFloat(item.cost)||0, Math.round(mp*100)/100,
        Math.round(sp*100)/100, parseFloat(item.qty)||0,
        Math.round(subtotal(item)*100)/100];
    });
    const matTot = matItems.reduce((s,i)=>s+subtotal(i),0);
    matRows.push([]);
    matRows.push(['','','','','','SUBTOTAL MAT', Math.round(matTot*100)/100]);
    const wsMat = XLSX.utils.aoa_to_sheet([matHeaders,...matRows]);
    wsMat['!cols'] = [{wch:40},{wch:16},{wch:12},{wch:12},{wch:14},{wch:10},{wch:14}];
    XLSX.utils.book_append_sheet(wb, wsMat, 'Materiales');

  // Hoja 4: Desglose interno de materiales
  const desgRows = [];
  const desgHeaders = ['Item (descripcion)','Material desglosado','Cantidad'];
  matItems.forEach(item => {
    if(item.matDetalles && item.matDetalles.length){
      item.matDetalles.forEach(d => {
        desgRows.push([item.desc||'', d.desc||'', parseFloat(d.qty)||0]);
      });
    }
  });
  if(desgRows.length){
    const wsDesg = XLSX.utils.aoa_to_sheet([desgHeaders,...desgRows]);
    wsDesg['!cols'] = [{wch:40},{wch:40},{wch:10}];
    XLSX.utils.book_append_sheet(wb, wsDesg, 'Desglose Materiales');
  }
  }

  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `presupuesto-${b.number.replace(/\//g,'-')}-${fecha}.xlsx`);
}

// ═══════════════════════════════════════════
//  EXPORTAR A EXCEL
// ═══════════════════════════════════════════
function exportarExcel(){
  if(!budgets.length){ alert('No hay presupuestos para exportar.'); return; }

  const statusLabel = {pending:'Pendiente',approved:'Aprobado',rejected:'Rechazado',executed:'Ejecutado',invoiced:'Facturado'};

  // ── Hoja 1: Resumen ──
  const resumenHeaders = ['N°','Fecha','Cliente','CUIT','Estado','Días Aprobado','Descripción','Neto','IVA 21%','Total c/IVA','Moneda','Pago','Anticipo (%)'];
  const resumenRows = budgets.map(b => {
    const t = calcTotals(b.items||[]);
    const dc = diasEnAprobado(b);
    return [
      b.number,
      b.date,
      b.client?.name || '',
      b.client?.cuit || '',
      statusLabel[b.status] || b.status,
      dc ? dc.dias : '',
      b.description || '',
      t.neto,
      t.iva,
      t.total,
      b.currency || 'ARS',
      b.paymentDays === 0 ? 'Contado' : b.paymentDays === -1 ? 'A convenir' : (b.paymentDays||30)+' días',
      b.anticipo || 0
    ];
  });

  // ── Hoja 2: Ítems ──
  const itemsHeaders = ['N° Presupuesto','Cliente','Estado','Tipo','Descripción','Modo','Costo unit.','Margen (%)','Precio venta','Cantidad','Subtotal'];
  const itemsRows = [];
  budgets.forEach(b => {
    (b.items||[]).forEach(item => {
      const sp = salePrice(item);
      const mp = marginPct(item);
      itemsRows.push([
        b.number,
        b.client?.name || '',
        statusLabel[b.status] || b.status,
        item.type === 'mo' ? 'Mano de obra' : 'Material',
        item.desc || '',
        item.mode === 'cost' ? 'Costo+margen' : 'Precio directo',
        parseFloat(item.cost)||0,
        Math.round(mp*100)/100,
        Math.round(sp*100)/100,
        parseFloat(item.qty)||0,
        Math.round(subtotal(item)*100)/100
      ]);
    });
  });

  const wb = XLSX.utils.book_new();

  // Hoja Resumen
  const wsResumen = XLSX.utils.aoa_to_sheet([resumenHeaders, ...resumenRows]);
  // Anchos de columna
  wsResumen['!cols'] = [
    {wch:14},{wch:12},{wch:28},{wch:16},{wch:12},{wch:14},{wch:40},
    {wch:16},{wch:14},{wch:16},{wch:8},{wch:12},{wch:12}
  ];
  XLSX.utils.book_append_sheet(wb, wsResumen, 'Resumen');

  // Hoja Ítems
  const wsItems = XLSX.utils.aoa_to_sheet([itemsHeaders, ...itemsRows]);
  wsItems['!cols'] = [
    {wch:14},{wch:28},{wch:12},{wch:14},{wch:40},{wch:16},
    {wch:12},{wch:12},{wch:14},{wch:10},{wch:14}
  ];
  XLSX.utils.book_append_sheet(wb, wsItems, 'Ítems');

  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `presupuestos-kat-${fecha}.xlsx`);
}

// Navegación con botón atrás del navegador
window.addEventListener('popstate', (e) => {
  const state = e.state;
  if (!state) { renderDashboard(); renderSidebar(); return; }
  if (state.view === 'budget' && state.budgetId) {
    openBudget(state.budgetId, false);
  } else {
    showView(state.view || 'list', false);
  }
});

// Inicializar Drive sync cuando cargue Google API
window.addEventListener('load', () => {
  const wait = setInterval(() => {
    if (window.google && window.google.accounts) {
      clearInterval(wait);
      DRIVE_SYNC.updateUI();
      if (DRIVE_SYNC.enabled && DRIVE_SYNC.CLIENT_ID) DRIVE_SYNC.init();
    }
  }, 300);
  setTimeout(() => clearInterval(wait), 6000);
});
