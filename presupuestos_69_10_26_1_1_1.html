<style>
  /* === Fuentes offline: equivalentes a Barlow/Barlow Condensed === */
  /* Orden de preferencia por sistema operativo:
     Windows:  Gill Sans MT Condensed / Trebuchet MS
     macOS/iOS: Gill Sans / Helvetica Neue
     Android:   Roboto Condensed / Roboto
     Linux:     Liberation Sans / DejaVu Sans
  */
  :root {
    --font-body: 'Gill Sans', 'Gill Sans MT', 'Trebuchet MS', 'Liberation Sans', 'Arial Narrow', Arial, sans-serif;
    --font-condensed: 'Gill Sans MT Condensed', 'Gill Sans Condensed', 'Arial Narrow', 'Roboto Condensed', 'Liberation Sans Narrow', 'Trebuchet MS', sans-serif;
  }
</style>
<style>
  :root {
    --bg: #0f1117; --surface: #181c25; --surface2: #1e2330;
    --border: #2a3042; --accent: #f5a623; --accent2: #e8881a;
    --blue: #3b82f6; --green: #22c55e; --red: #ef4444;
    --text: #e8eaf0; --text2: #8892a4; --text3: #5a6478; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { flex: 1; padding: 32px 40px; overflow-y: auto; }

  .logo { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
  .logo-tag { font-family: var(--font-condensed); font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  .logo-title { font-family: var(--font-condensed); font-size: 20px; font-weight: 800; line-height: 1.2; color: var(--text); }
  .sidebar-section { padding: 20px 16px 8px; }
  .sidebar-section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; padding: 0 8px; }
  .sidebar-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border-radius: 8px; background: none; border: none; cursor: pointer; color: var(--text2); font-family: var(--font-body); font-size: 14px; font-weight: 500; transition: all .18s; text-align: left; margin-bottom: 2px; }
  .sidebar-btn:hover { background: var(--surface2); color: var(--text); }
  .sidebar-btn.active { background: rgba(245,166,35,.12); color: var(--accent); }
  .budget-list { padding: 8px 16px 16px; flex: 1; }
  .budget-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; transition: all .18s; }
  .budget-item:hover { background: var(--surface2); }
  .budget-item.active { background: var(--surface2); border-color: var(--border); }
  .budget-item-num { font-family: var(--font-condensed); font-size: 12px; font-weight: 700; color: var(--accent); }
  .budget-item-client { font-size: 13px; font-weight: 500; color: var(--text); margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .budget-item-amount { font-size: 12px; color: var(--text2); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-pending  { background: rgba(245,166,35,.15); color: var(--accent); }
  .badge-approved { background: rgba(34,197,94,.15);  color: var(--green); }
  .badge-rejected { background: rgba(239,68,68,.15);  color: var(--red); }
  .badge-executed { background: rgba(99,102,241,.15); color: #818cf8; }
  .badge-invoiced { background: rgba(14,165,233,.15); color: #38bdf8; }
  .dias-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-top: 4px; white-space: nowrap; }
  .dias-badge.ok    { background: rgba(34,197,94,.12);  color: var(--green); }
  .dias-badge.warn  { background: rgba(245,166,35,.15); color: var(--accent); }
  .dias-badge.alert { background: rgba(239,68,68,.15);  color: var(--red); }
  .dias-badge.done  { background: rgba(14,165,233,.1);  color: #38bdf8; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .page-title { font-family: var(--font-condensed); font-size: 32px; font-weight: 800; }
  .page-title span { color: var(--accent); }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .18s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #0f1117; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(239,68,68,.1); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
  .btn-danger:hover { background: rgba(239,68,68,.2); }
  .btn-sm { padding: 6px 14px; font-size: 13px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
  .card-title { font-family: var(--font-condensed); font-size: 14px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: .5px; text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-family: var(--font-body); font-size: 14px; transition: border-color .18s; outline: none; width: 100%; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group textarea[rows="6"] { min-height: 130px; }
  .form-group select option { background: var(--surface); }

  /* ── ITEMS TABLE ── */
  .items-section { margin-bottom: 24px; }
  .items-section-title { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 10px 14px; border-radius: 8px 8px 0 0; }
  .items-section-title.mo { background: rgba(59,130,246,.1); color: #60a5fa; border: 1px solid rgba(59,130,246,.2); border-bottom: none; }
  .items-section-title.mat { background: rgba(245,166,35,.08); color: var(--accent); border: 1px solid rgba(245,166,35,.2); border-bottom: none; }
  .items-table-wrap { border: 1px solid var(--border); border-radius: 0 0 8px 8px; overflow: hidden; margin-bottom: 6px; }
  .items-col-header { display: grid; grid-template-columns: 2.2fr 90px 110px 80px 110px 70px 110px 36px; gap: 6px; padding: 8px 12px; font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .item-row { display: grid; grid-template-columns: 2.2fr 90px 110px 80px 110px 70px 110px 36px; gap: 6px; padding: 6px 12px; align-items: center; border-bottom: 1px solid rgba(255,255,255,.03); transition: background .12s; }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--surface2); }
  .item-row input { background: transparent; border: 1px solid transparent; color: var(--text); padding: 5px 8px; border-radius: 6px; font-family: var(--font-body); font-size: 13px; outline: none; width: 100%; transition: all .13s; }
  .item-row input:focus { background: var(--bg); border-color: var(--accent); }
  .item-row input.num { text-align: right; }
  .item-row select { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 5px 6px; border-radius: 6px; font-family: var(--font-body); font-size: 12px; outline: none; width: 100%; cursor: pointer; }
  .item-subtotal { font-family: var(--font-condensed); font-size: 14px; font-weight: 700; color: var(--text); text-align: right; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; transition: all .13s; }
  .del-btn:hover { background: rgba(239,68,68,.15); color: var(--red); }
  .mode-pill { font-size: 11px; padding: 4px 8px; border-radius: 5px; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text3); font-family: var(--font-body); font-weight: 600; width: 100%; transition: all .13s; text-align: center; }
  .mode-pill.cost { border-color: rgba(59,130,246,.4); color: #60a5fa; background: rgba(59,130,246,.08); }
  .mode-pill.direct { border-color: rgba(245,166,35,.4); color: var(--accent); background: rgba(245,166,35,.08); }
  .add-item-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; background: none; border: 1px dashed var(--border); color: var(--text3); font-family: var(--font-body); font-size: 13px; cursor: pointer; transition: all .15s; width: 100%; margin-top: 4px; }
  .add-item-btn:hover { border-color: var(--accent); color: var(--accent); }

  .totals-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; max-width: 400px; margin-left: auto; }
  .totals-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 14px; color: var(--text2); border-bottom: 1px solid rgba(255,255,255,.04); }
  .totals-row:last-child { border-bottom: none; }
  .totals-row .amount { font-family: var(--font-condensed); font-size: 16px; font-weight: 700; color: var(--text); }
  .totals-row.total-final { font-family: var(--font-condensed); font-size: 20px; font-weight: 800; color: var(--text); padding-top: 14px; margin-top: 4px; border-top: 2px solid var(--accent) !important; border-bottom: none !important; }
  .totals-row.total-final .label { color: var(--accent); }
  .totals-row.total-final .amount { font-size: 26px; }
  .iva-tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: rgba(59,130,246,.15); color: var(--blue); font-weight: 600; }

  .tabs { display: flex; gap: 4px; margin-bottom: 28px; }
  .tab { padding: 8px 18px; border-radius: 8px; cursor: pointer; border: none; background: none; font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--text2); transition: all .18s; }
  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active { background: var(--surface2); color: var(--accent); font-weight: 600; border-bottom: 2px solid var(--accent); }


  /* ── DETALLE INTERNO DE MATERIALES ── */
  .mat-detalle-panel { background: rgba(245,166,35,.06); border: 1px dashed rgba(245,166,35,.35); border-top: none; padding: 14px 16px 12px; margin-bottom: 8px; }
  .mat-detalle-panel .panel-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .mat-det-header { display: grid; grid-template-columns: 1fr 90px 28px; gap: 6px; padding: 0 0 6px; border-bottom: 1px solid rgba(245,166,35,.15); margin-bottom: 6px; }
  .mat-det-header span { font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text3); }
  .mat-det-header span.num { text-align: right; }
  .mat-det-row { display: grid; grid-template-columns: 1fr 90px 28px; gap: 6px; margin-bottom: 5px; align-items: center; }
  .mat-det-row input { background: var(--bg); border: 1px solid rgba(245,166,35,.2); color: var(--text); padding: 6px 10px; border-radius: 6px; font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color .13s; }
  .mat-det-row input:focus { border-color: var(--accent); }
  .mat-det-row input.num { text-align: right; }
  .mat-det-add { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 7px; background: none; border: 1px dashed rgba(245,166,35,.4); color: var(--accent); font-family: var(--font-body); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .13s; margin-top: 8px; }
  .mat-det-add:hover { background: rgba(245,166,35,.1); border-style: solid; }
  .mat-import-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 7px; background: none; border: 1px dashed rgba(59,130,246,.4); color: var(--blue); font-family: var(--font-body); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .13s; margin-top: 8px; margin-left: 8px; }
  .mat-import-btn:hover { background: rgba(59,130,246,.1); border-style: solid; }
  .mat-import-panel { background: rgba(59,130,246,.06); border: 1px solid rgba(59,130,246,.25); border-radius: 8px; padding: 14px 16px; margin-top: 10px; }
  .mat-import-panel textarea { width: 100%; background: var(--bg); border: 1px solid rgba(59,130,246,.3); color: var(--text); padding: 8px 12px; border-radius: 7px; font-family: var(--font-body); font-size: 13px; outline: none; resize: vertical; min-height: 100px; transition: border-color .13s; }
  .mat-import-panel textarea:focus { border-color: var(--blue); }
  @media (max-width: 768px) {
    .mat-det-row, .mat-det-header { grid-template-columns: 1fr 65px 28px; }

  .preview-watermark { display: none; }

  .preview-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
  .preview-header-left { display: flex; align-items: center; }
  .preview-company-logo-print { display: none; }
  .preview-company-name { font-family: var(--font-condensed); font-size: 28px; font-weight: 800; }
  .preview-company-sub { font-size: 12px; color: #666; margin-top: 2px; }
  .preview-badge { font-family: var(--font-condensed); background: #1565c0; color: #fff; padding: 12px 20px; border-radius: 8px; text-align: right; }
  .preview-badge-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: .7; }
  .preview-badge-num { font-size: 22px; font-weight: 800; }
  .preview-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; background: rgba(255,255,255,0.75); border-radius: 8px; padding: 16px; }
  .preview-meta-block h4 { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #999; margin-bottom: 6px; }
  .preview-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  .preview-table th { background: #1565c0; color: #fff; padding: 10px 12px; text-align: left; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-family: var(--font-condensed); font-weight: 700; }
  .preview-table th:last-child, .preview-table td:last-child { text-align: right; }
  .preview-table td { padding: 10px 12px; border-bottom: 1px solid #ddd; font-size: 13px; background: rgba(255,255,255,0.82); text-align: left; vertical-align: top; }
  .preview-table tr:last-child td { border-bottom: none; }
  .preview-section-head td { background: rgba(21,101,192,0.1) !important; font-weight: 700; font-size: 12px; letter-spacing: .5px; color: #1565c0; padding: 8px 12px !important; }
  .preview-totals { margin-left: auto; max-width: 280px; background: rgba(255,255,255,0.85); border-radius: 8px; padding: 12px 16px; }
  .preview-totals table { width: 100%; }
  .preview-totals td { padding: 5px 0; font-size: 13px; }
  .preview-totals td:last-child { text-align: right; font-weight: 600; }
  .preview-totals tr.total-final td { border-top: 2px solid #1565c0; padding-top: 10px; font-size: 17px; font-weight: 800; color: #1565c0; }
  .preview-footer { display: none; }
  .preview-footer-print { display: none; }

  /* RENTABILIDAD */
  .rent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .rent-input-group { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .rent-input-group h4 { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
  .rent-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 12px; }
  .rent-row label { font-size: 13px; color: var(--text2); flex: 1; }
  .rent-row .rent-pct { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-family: var(--font-body); font-size: 13px; outline: none; width: 90px; text-align: right; transition: border-color .15s; }
  .rent-row .rent-pct:focus { border-color: var(--accent); }
  .rent-row .rent-amt { font-family: var(--font-condensed); font-size: 14px; font-weight: 600; color: var(--text2); min-width: 110px; text-align: right; }
  .rent-result { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .rent-result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 14px; }
  .rent-result-row:last-child { border-bottom: none; }
  .rent-result-row .lbl { color: var(--text2); }
  .rent-result-row .val { font-family: var(--font-condensed); font-size: 16px; font-weight: 700; }
  .rent-result-row.highlight { margin-top: 8px; padding-top: 16px; border-top: 2px solid var(--border) !important; }
  .rent-result-row.highlight .lbl { color: var(--text); font-weight: 600; }
  .rent-result-row.highlight .val { font-size: 22px; }
  .rent-gauge { margin-top: 16px; background: var(--bg); border-radius: 8px; overflow: hidden; height: 12px; }
  .rent-gauge-bar { height: 100%; border-radius: 8px; transition: width .4s, background .4s; }
  .rent-gauge-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--text3); }
  .rent-info { background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #93c5fd; line-height: 1.5; }

  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
  .stat-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text); text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-condensed); font-size: 28px; font-weight: 800; }
  .stat-value.gold { color: var(--accent); } .stat-value.green { color: var(--green); } .stat-value.blue { color: var(--blue); }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }

  @page {
    size: A4;
    margin: 18mm 14mm 18mm 14mm;
  }

  /* ═══════════════════════════════════════════
     RESPONSIVE MÓVIL
  ═══════════════════════════════════════════ */
  @media (max-width: 768px) {

    /* Layout base */
    .app { flex-direction: column; }

    /* Sidebar como barra superior */
    .sidebar {
      width: 100% !important;
      min-width: unset !important;
      height: auto !important;
      position: sticky;
      top: 0;
      z-index: 100;
      border-right: none !important;
      border-bottom: 1px solid var(--border);
      flex-direction: column;
      overflow: visible;
    }

    /* Logo más compacto */
    .logo { padding: 12px 14px 10px; display: flex; align-items: center; justify-content: space-between; }
    .logo-tag { font-size: 10px; margin-bottom: 2px; }
    .logo-title { font-size: 15px; line-height: 1.2; }

    /* Menú colapsable en móvil */
    .sidebar-sections { display: none; }
    .sidebar-sections.open { display: block; background: var(--surface); border-top: 1px solid var(--border); max-height: 80vh; overflow-y: auto; }
    .sidebar-section { padding: 12px 16px 6px; }
    .sidebar-btn { padding: 13px 12px; font-size: 15px; min-height: 48px; }

    /* Botón hamburguesa */
    .mobile-menu-btn {
      display: flex !important;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      min-height: 44px;
    }

    /* Lista de presupuestos en sidebar: ocultar en móvil (están en el main) */
    .budget-list { display: none; }

    /* Main content */
    .main { padding: 14px 12px; }

    /* Page header */
    .page-header { flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
    .page-title { font-size: 20px; }

    /* Stats grid: 2 columnas en móvil */
    .stats-grid { grid-template-columns: 1fr 1fr !important; gap: 8px; }
    .stat-card { padding: 12px; }
    .stat-value { font-size: 22px !important; }
    .stat-label { font-size: 10px; }

    /* Tabla dashboard: convertir en cards en móvil */
    .dash-col-fecha { display: none; }
    .dash-col-acciones { display: none; }
    .dash-col-desc { display: none !important; }
    .dash-table-wrap table thead { display: none; }
    .dash-table-wrap table tbody tr {
      display: flex !important;
      flex-wrap: wrap !important;
      padding: 12px !important;
      border-bottom: 1px solid var(--border) !important;
      gap: 4px;
      align-items: center;
    }
    .dash-table-wrap table tbody tr td {
      display: block !important;
      padding: 2px 4px !important;
      border: none !important;
    }
    .dash-table-wrap table tbody tr td:nth-child(1) { font-size: 12px !important; order: 1; }
    .dash-table-wrap table tbody tr td:nth-child(2) { font-size: 14px !important; font-weight: 600; order: 2; flex: 1; }
    .dash-table-wrap table tbody tr td:nth-child(4) { order: 3; }
    .dash-table-wrap table tbody tr td:nth-child(6) { order: 4; flex-basis: 100%; font-size: 18px !important; font-weight: 700; color: var(--accent); text-align: left !important; }

    /* Cards */
    .card { padding: 14px; margin-bottom: 14px; }

    /* Grids de formulario */
    .grid-2 { grid-template-columns: 1fr !important; }
    .grid-3 { grid-template-columns: 1fr 1fr !important; }

    /* Inputs y campos más grandes para touch */
    .form-group input,
    .form-group select,
    .form-group textarea {
      font-size: 16px !important; /* Evita zoom automático en iOS */
      padding: 11px 14px;
      min-height: 44px;
    }

    /* ── TABLA DE ÍTEMS: modo card en móvil ── */
    .items-col-header { display: none !important; }
    .item-row {
      display: flex !important;
      flex-direction: column !important;
      gap: 8px !important;
      padding: 12px !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      margin-bottom: 8px !important;
      background: var(--surface2) !important;
    }
    .item-row > *:last-child { align-self: flex-end; }
    .item-row input,
    .item-row select {
      font-size: 16px !important;
      min-height: 40px;
    }
    .item-subtotal { font-size: 16px !important; text-align: left !important; }
    .mode-pill { width: auto !important; font-size: 12px; }

    /* Botón de agregar ítem */
    .add-item-btn { min-height: 44px; font-size: 14px; justify-content: center; }
    .del-btn { width: 36px; height: 36px; }

    /* Totales: full width */
    .totals-box { max-width: 100% !important; margin-left: 0 !important; }
    .totals-row .amount { font-size: 15px; }
    .totals-row.total-final .amount { font-size: 22px; }

    /* Vista previa del presupuesto */
    .preview-paper { padding: 12px !important; font-size: 11px; min-height: auto !important; }
    .preview-header { flex-direction: column !important; gap: 10px; }
    .preview-totals { max-width: 100% !important; margin-left: 0 !important; }
    .preview-totals td { font-size: 12px !important; }
    .preview-table { font-size: 10px; }
    .preview-table th, .preview-table td { padding: 6px 6px !important; font-size: 10px !important; }
    .preview-meta { grid-template-columns: 1fr !important; gap: 12px; }

    /* Rentabilidad */
    .rent-grid { grid-template-columns: 1fr !important; }

    /* Tabs */
    .tabs { overflow-x: auto; gap: 2px; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .tab { font-size: 13px; padding: 8px 12px; white-space: nowrap; min-height: 44px; }

    /* Botones */
    .btn { padding: 10px 16px; font-size: 14px; min-height: 44px; }

<script>
// ═══════════════════════════════════════════
//  GOOGLE DRIVE SYNC
// ═══════════════════════════════════════════
const DRIVE_SYNC = {
  CLIENT_ID: localStorage.getItem('drive_client_id') || '',
  SCOPES: 'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/drive.file',
  FILE_NAME: 'kat-presupuestos-sync.json',
  token: null,
  fileId: localStorage.getItem('drive_file_id') || null,
  syncing: false,
  lastSync: parseInt(localStorage.getItem('drive_last_sync') || '0'),
  enabled: localStorage.getItem('drive_enabled') === 'true',
  syncTimer: null,

  async init() {
    if (!this.CLIENT_ID || !this.enabled) return;
    try { await this.signIn(true); } catch(e) {}
  },

  signIn(silent = false) {
    return new Promise((resolve, reject) => {
      if (!window.google) { reject(new Error('API Google no cargada')); return; }
      const client = google.accounts.oauth2.initTokenClient({
        client_id: this.CLIENT_ID,
        scope: this.SCOPES,
        prompt: silent ? 'none' : '',
        callback: (resp) => {
          if (resp.error) { reject(new Error(resp.error)); return; }
          this.token = resp.access_token;
          this.enabled = true;
          localStorage.setItem('drive_enabled', 'true');
          resolve(resp.access_token);
        }
      });
      client.requestAccessToken();
    });
  },

  signOut() {
    if (this.token) google.accounts.oauth2.revoke(this.token);
    this.token = null; this.enabled = false; this.fileId = null;
    localStorage.removeItem('drive_enabled');
    localStorage.removeItem('drive_file_id');
    localStorage.removeItem('drive_last_sync');
    this.updateUI();
  },

  async fetch(url, options = {}) {
    if (!this.token) throw new Error('Sin token');
    const resp = await fetch(url, {
      ...options,
      headers: { 'Authorization': `Bearer ${this.token}`, ...options.headers }
    });
    if (resp.status === 401) { this.token = null; throw new Error('Token expirado'); }
    return resp;
  },

  async getOrCreateFile() {
    const searchResp = await this.fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${this.FILE_NAME}'&fields=files(id,name)`
    );
    const searchData = await searchResp.json();
    if (searchData.files && searchData.files.length > 0) {
      this.fileId = searchData.files[0].id;
      localStorage.setItem('drive_file_id', this.fileId);
      return { id: this.fileId, exists: true };
    }
    const metaResp = await this.fetch(
      'https://www.googleapis.com/drive/v3/files?fields=id',
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: this.FILE_NAME, parents: ['appDataFolder'] }) }
    );
    const meta = await metaResp.json();
    this.fileId = meta.id;
    localStorage.setItem('drive_file_id', this.fileId);
    return { id: this.fileId, exists: false };
  },

  async pull() {
    this.setSyncStatus('syncing', '↓ Leyendo Drive...');
    try {
      if (!this.token) await this.signIn(true);
      const { id, exists } = await this.getOrCreateFile();
      if (!exists) { this.setSyncStatus('ok', '✓ Conectado (sin datos en Drive)'); return null; }
      const resp = await this.fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`);
      const data = await resp.json();
      this.lastSync = Date.now();
      localStorage.setItem('drive_last_sync', this.lastSync.toString());
      this.setSyncStatus('ok', this.syncLabel());
      return data;
    } catch(e) { this.setSyncStatus('error', '⚠ Error al leer'); throw e; }
  },

  async push(datos) {
    if (!this.enabled || !this.token || this.syncing) return;
    this.syncing = true;
    this.setSyncStatus('syncing', '↑ Guardando en Drive...');
    try {
      const { id } = await this.getOrCreateFile();
      const blob = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: this.FILE_NAME })], { type: 'application/json' }));
      form.append('file', blob);
      await this.fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=multipart`,
        { method: 'PATCH', body: form });
      this.lastSync = Date.now();
      localStorage.setItem('drive_last_sync', this.lastSync.toString());
      this.setSyncStatus('ok', this.syncLabel());
    } catch(e) { this.setSyncStatus('error', '⚠ Error al guardar'); }
    finally { this.syncing = false; }
  },

  schedulePush() {
    if (!this.enabled || !this.token) return;
    clearTimeout(this.syncTimer);
    this.setSyncStatus('pending', '● Cambios pendientes...');
    this.syncTimer = setTimeout(() => { this.push(buildDrivePayload()); }, 2000);
  },

  async syncManual() {
    if (!this.CLIENT_ID) { showDriveSetup(); return; }
    if (!this.token) {
      try { await this.signIn(false); this.updateUI(); await this.pullAndMerge(); }
      catch(e) { alert('No se pudo conectar con Google: ' + e.message); }
      return;
    }
    await this.pullAndMerge();
  },

  async pullAndMerge() {
    try {
      const remote = await this.pull();
      if (!remote) {
        await this.push(buildDrivePayload());
        alert('✅ Datos locales subidos a Drive por primera vez.');
        this.updateUI(); return;
      }
      const remoteCount = (remote.presupuestos || []).length;
      const localCount = budgets.length;
      const msg = `📥 Datos en Drive: ${remoteCount} presupuesto${remoteCount !== 1 ? 's' : ''} (${remote.fecha?.slice(0,10) || '?'})\n` +
                  `💾 Datos locales: ${localCount} presupuesto${localCount !== 1 ? 's' : ''}\n\n` +
                  `¿Qué querés hacer?\n• OK → Cargar datos de Drive\n• Cancelar → Subir datos locales a Drive`;
      if (confirm(msg)) {
        applyDriveData(remote);
        alert('✅ Datos de Drive cargados. La app se va a recargar.');
        location.reload();
      } else {
        await this.push(buildDrivePayload());
        alert('✅ Datos locales subidos a Drive.');
      }
      this.updateUI();
    } catch(e) { alert('Error de sincronización: ' + e.message); }
  },

  syncLabel() {
    if (!this.lastSync) return '✓ Conectado';
    const mins = Math.round((Date.now() - this.lastSync) / 60000);
    if (mins < 1) return '✓ Guardado hace instantes';
    if (mins === 1) return '✓ Guardado hace 1 min';
    if (mins < 60) return `✓ Guardado hace ${mins} min`;
    return `✓ Guardado hace ${Math.round(mins/60)}h`;
  },

  setSyncStatus(state, label) {
    const el = document.getElementById('drive-sync-status');
    if (!el) return;
    const colors = { ok: 'var(--green)', error: 'var(--red)', syncing: 'var(--accent)', pending: '#38bdf8' };
    el.style.color = colors[state] || 'var(--text2)';
    el.textContent = label;
  },

  updateUI() {
    const btn = document.getElementById('drive-sync-btn');
    const status = document.getElementById('drive-sync-status');
    if (!btn) return;
    if (!this.CLIENT_ID) {
      btn.textContent = '☁ Configurar Drive';
      btn.style.color = 'var(--text2)';
      if (status) { status.textContent = 'Sin configurar'; status.style.color = 'var(--text3)'; }
    } else if (!this.token) {
      btn.textContent = '☁ Conectar Drive';
      btn.style.color = '#38bdf8';
      if (status) { status.textContent = 'Desconectado'; status.style.color = 'var(--text3)'; }
    } else {
      btn.textContent = '☁ Sync Drive';
      btn.style.color = 'var(--green)';
      this.setSyncStatus('ok', this.syncLabel());
    }
    const discBtn = document.getElementById('drive-disconnect-btn');
    if (discBtn) discBtn.style.display = this.token ? 'flex' : 'none';
  }
};

function buildDrivePayload() {
  return {
    version: 1, fecha: new Date().toISOString(),
    presupuestos: budgets,
    empresa: JSON.parse(localStorage.getItem('company_data') || 'null'),
    logo: localStorage.getItem('company_logo') || null,
    rentConfig: JSON.parse(localStorage.getItem('rent_config') || 'null'),
    hhConfig: JSON.parse(localStorage.getItem('hh_config') || 'null'),
    retConfig: JSON.parse(localStorage.getItem('ret_config') || 'null')
  };
}

function applyDriveData(datos) {
  if (datos.presupuestos) localStorage.setItem('presupuestos_data', JSON.stringify(datos.presupuestos));
  if (datos.empresa) localStorage.setItem('company_data', JSON.stringify(datos.empresa));
  if (datos.logo) localStorage.setItem('company_logo', datos.logo);
  if (datos.rentConfig) localStorage.setItem('rent_config', JSON.stringify(datos.rentConfig));
  if (datos.hhConfig) localStorage.setItem('hh_config', JSON.stringify(datos.hhConfig));
  if (datos.retConfig) localStorage.setItem('ret_config', JSON.stringify(datos.retConfig));
}

function showDriveSetup() {
  const existing = document.getElementById('drive-setup-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'drive-setup-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:480px;width:100%">
      <h3 style="font-family:var(--font-condensed);font-size:20px;font-weight:800;margin-bottom:8px">☁ Configurar Google Drive Sync</h3>
      <p style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6">
        Pegá tu <strong>Client ID</strong> de Google Cloud para sincronizar entre dispositivos.
      </p>
      <div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:14px;margin-bottom:20px;font-size:12px;color:#93c5fd;line-height:1.7">
        El Client ID tiene el formato:<br>
        <code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:3px">740997155453-xxxx.apps.googleusercontent.com</code>
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:6px">Client ID</label>
        <input id="drive-client-id-input" type="text" placeholder="xxxx.apps.googleusercontent.com"
          value="${DRIVE_SYNC.CLIENT_ID}"
          style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:13px;font-family:var(--font-body);outline:none">
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button onclick="document.getElementById('drive-setup-modal').remove()"
          style="background:none;border:1px solid var(--border);color:var(--text2);padding:9px 18px;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:14px">Cancelar</button>
        <button onclick="saveDriveClientId()"
          style="background:var(--accent);color:#0f1117;border:none;padding:9px 20px;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:14px;font-weight:700">Guardar y Conectar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function saveDriveClientId() {
  const val = document.getElementById('drive-client-id-input').value.trim();
  if (!val) { alert('Ingresá el Client ID'); return; }
  DRIVE_SYNC.CLIENT_ID = val;
  localStorage.setItem('drive_client_id', val);
  document.getElementById('drive-setup-modal').remove();
  DRIVE_SYNC.syncManual();
}

function confirmDriveDisconnect() {
  if (confirm('¿Desconectar Google Drive?\nLos datos locales se mantienen.')) {
    DRIVE_SYNC.signOut();
  }
}
</script>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const IVA = 0.21;
const _savedCompany = JSON.parse(localStorage.getItem('company_data')||'null');
const COMPANY = {
  name:       _savedCompany?.name       || 'Kat Electricidad',
  cuit:       _savedCompany?.cuit       || '30716551551',
  address:    _savedCompany?.address    || 'Ratery 132, Mar del Plata',
  phone:      _savedCompany?.phone      || '223-3422441',
  email:      'administracion.kat@electricidadindustrial.ar',
  condition:  _savedCompany?.condition  || 'Responsable Inscripto',
  logo:       localStorage.getItem('company_logo') || null
};

function saveCompany(){
  const {logo, ...rest} = COMPANY;
  try { localStorage.setItem('company_data', JSON.stringify(rest)); } catch(e){}
  try {
    if(logo) localStorage.setItem('company_logo', logo);
    else localStorage.removeItem('company_logo');
  } catch(e){}
}

function uploadLogo(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 600;
      let w = img.width, h = img.height;
      if(w > MAX || h > MAX){
        if(w > h){ h = Math.round(h * MAX/w); w = MAX; }
        else { w = Math.round(w * MAX/h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      COMPANY.logo = canvas.toDataURL('image/png', 0.85);
      saveCompany();
      renderForm();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

let budgets = JSON.parse(localStorage.getItem('presupuestos_data')||'[]');
let currentBudget = null;

function save(){
  localStorage.setItem('presupuestos_data',JSON.stringify(budgets));
  if(typeof DRIVE_SYNC !== 'undefined') DRIVE_SYNC.schedulePush();
}
function nextNumber(){ const y=new Date().getFullYear(); const c=budgets.filter(b=>b.number.includes(String(y))).length+1; return `${y}-${String(c).padStart(4,'0')}`; }
function today(){ return new Date().toISOString().split('T')[0]; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x.toISOString().split('T')[0]; }
function fmtDate(d){ if(!d) return '-'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function fmtARS(n){ return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:2}).format(n||0); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Contador de días: activo desde 'approved', se detiene en 'invoiced'
function diasEnAprobado(b){
  if(!b.date_approved) return null;
  const inicio = new Date(b.date_approved);
  const fin    = (b.status === 'invoiced' && b.date_invoiced)
                   ? new Date(b.date_invoiced)
                   : new Date();
  const dias = Math.floor((fin - inicio) / (1000*60*60*24));
  if(dias < 0) return null;
  const cerrado = b.status === 'invoiced';
  let cls = cerrado ? 'done' : (dias <= 7 ? 'ok' : dias <= 21 ? 'warn' : 'alert');
  const icono = cerrado ? '\u2705' : (dias <= 7 ? '\uD83D\uDFE2' : dias <= 21 ? '\uD83D\uDFE1' : '\uD83D\uDD34');
  const label = cerrado
    ? icono + ' ' + dias + ' d\xEDa' + (dias!==1?'s':'') + ' (aprobado \u2192 facturado)'
    : icono + ' ' + dias + ' d\xEDa' + (dias!==1?'s':'') + ' en aprobado';
  return { dias, cls, label, cerrado };
}

// ── Item math ──
// mode='cost'  → price = cost*(1+margin/100)  |  margin shown from inputs
// mode='direct'→ price = item.price directly   |  margin% = (price-cost)/price*100
function salePrice(item){
  const cost=parseFloat(item.cost)||0, price=parseFloat(item.price)||0, pct=parseFloat(item.margin)||0;
  return item.mode==='cost' ? cost*(1+pct/100) : price;
}
function marginPct(item){
  const c=parseFloat(item.cost)||0, p=salePrice(item);
  return p>0 ? (p-c)/p*100 : 0;
}
function subtotal(item){ return salePrice(item)*(parseFloat(item.qty)||0); }

function calcTotals(items){
  const neto=items.reduce((s,i)=>s+subtotal(i),0);
  return { neto, iva:neto*IVA, total:neto+neto*IVA };
}

function renderItems(type){
  const cont=document.getElementById(`items-${type}`);
  if(!cont) return;
  const items=currentBudget.items.filter(i=>i.type===type);
  if(!items.length){
    cont.innerHTML=`<div style="padding:14px 12px;font-size:13px;color:var(--text3)">Sin ítems. Usá el botón de abajo.</div>`;
    return;
  }
  cont.innerHTML=items.map(item=>{
    const gi=currentBudget.items.indexOf(item);
    const sp=salePrice(item), mp=marginPct(item), sub=subtotal(item);
    const isCost=item.mode==='cost';
    const mCol=mp>=30?'#22c55e':mp>=10?'#f5a623':'#ef4444';
    return `<div class="item-row" id="irow-${gi}">
      <input type="text" value="${esc(item.desc)}" placeholder="Descripción..."
        oninput="updateItem(${gi},'desc',this.value)">

      <button class="mode-pill ${isCost?'cost':'direct'}" onclick="toggleMode(${gi})"
        title="Click para cambiar modo">${isCost?'C+Margen':'Directo'}</button>

      <input type="number" class="num" value="${item.cost||''}" placeholder="0.00" min="0" step="0.01"
        title="Costo interno (no visible al cliente)"
        oninput="updateItem(${gi},'cost',this.value)">

      <input type="number" class="num" value="${isCost?(item.margin||''):mp.toFixed(1)}"
        placeholder="%" min="0" step="0.5"
        ${isCost?`oninput="updateItem(${gi},'margin',this.value)"`:'readonly'}
        style="${!isCost?'opacity:.5;cursor:default':''}"
        title="${isCost?'% margen sobre costo':'Margen calculado automáticamente'}">

      <input type="number" class="num" value="${isCost?sp.toFixed(2):(item.price||'')}"
        placeholder="0.00" min="0" step="0.01"
        ${isCost?'readonly style="background:rgba(34,197,94,.06);color:var(--green)"':`oninput="updateItem(${gi},'price',this.value)"`}
        title="${isCost?'Precio calculado automáticamente':'Precio de venta al cliente'}">

      <input type="number" class="num" value="${item.qty||1}" min="0" step="1" placeholder="1"
        oninput="updateItem(${gi},'qty',this.value)">

      <div style="text-align:right">
        <div class="item-subtotal" id="sub-${gi}">${fmtARS(sub)}</div>
        <div style="font-size:11px;color:${mCol};font-weight:600;margin-top:2px">${mp.toFixed(1)}% mg</div>
      </div>

      <button class="del-btn" onclick="removeItem(${gi})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    ${item.type==='mat' ? `
    <div class="mat-detalle-panel" style="border-radius:0 0 8px 8px;margin-bottom:2px">
      <div class="panel-title">&#128230; Listado interno de materiales <span style="font-size:10px;font-weight:400;color:var(--text3)">&mdash; solo para vos, no aparece en el PDF</span></div>
      <div id="mat-det-rows-${gi}">${renderMatDetalleRows(gi)}</div>
      <div style="display:flex;gap:0;flex-wrap:wrap;align-items:center">
        <button class="mat-det-add" onclick="addMatDetalle(${gi})">+ Agregar material</button>
        <button class="mat-import-btn" onclick="toggleMatImport(${gi})">📋 Importar lista</button>
        <button class="mat-import-btn" onclick="document.getElementById('mat-xlsx-${gi}').click()" style="border-color:rgba(34,197,94,.4);color:var(--green)">
          📊 Importar Excel/CSV
        </button>
        <input type="file" id="mat-xlsx-${gi}" accept=".xlsx,.xls,.csv" style="display:none" onchange="importarMatDesdeExcel(${gi},this)">
        <button class="mat-import-btn" onclick="document.getElementById('mat-pdf-${gi}').click()" style="border-color:rgba(239,68,68,.4);color:var(--red)">
          📄 Importar PDF
        </button>
        <input type="file" id="mat-pdf-${gi}" accept=".pdf" style="display:none" onchange="importarMatDesdePDF(${gi},this)">
      </div>
      <div id="mat-import-panel-${gi}" style="display:none">
        <div class="mat-import-panel" style="margin-top:10px">
          <div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">📋 Pegar lista de materiales</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.5">Pegá el texto del mail o WhatsApp — una línea por material. La cantidad puede ir al principio o al final.<br>
          <span style="opacity:.7">Ej: "10 cable 2.5mm" · "caño conduit 3/4 x 5" · "disyuntor 16A - 3 unidades"</span></div>
          <textarea id="mat-import-text-${gi}" placeholder="10 cable 2.5mm IRAM&#10;caño conduit 3/4 x 5&#10;3 disyuntor 16A bipolares&#10;cinta aislante x 2"></textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="mat-det-add" style="border-style:solid;background:rgba(59,130,246,.1);border-color:var(--blue);color:var(--blue)" onclick="importarMatDesdeTexto(${gi})">✓ Importar</button>
            <button class="mat-det-add" style="opacity:.6" onclick="toggleMatImport(${gi})">Cancelar</button>
          </div>
        </div>
      </div>
    </div>` : ''}
    `;
  }).join('');
}

function toggleMode(i){
  currentBudget.items[i].mode = currentBudget.items[i].mode==='cost'?'direct':'cost';
  save(); renderItems(currentBudget.items[i].type); renderTotals();
}

function addItem(type){
  const defaultCost = type==='mo' ? (hhConfig.costoGuardado||0) : 0;
  currentBudget.items.push({desc:'',type,mode:'cost',cost:defaultCost,margin:30,price:0,qty:1});
  save(); renderItems(type); renderTotals();
}

function removeItem(i){
  const type=currentBudget.items[i].type;
  currentBudget.items.splice(i,1);
  save(); renderItems('mo'); renderItems('mat'); renderTotals(); renderSidebar();
}

function updateItem(i,field,val){
  currentBudget.items[i][field]=val; save();
  const item=currentBudget.items[i];
  const sp=salePrice(item), mp=marginPct(item);
  const subEl=document.getElementById(`sub-${i}`);
  if(subEl) subEl.textContent=fmtARS(subtotal(item));
  // update readonly price in cost mode
  if(item.mode==='cost'){
    const row=document.getElementById(`irow-${i}`);
    if(row){ const ins=row.querySelectorAll('input[type=number]'); if(ins[2]) ins[2].value=sp.toFixed(2); }
  }
  renderTotals(); renderSidebar();
}

// ═══════════════════════════════════════════
//  TOTALS
// ═══════════════════════════════════════════
function renderTotals(){
  const cont=document.getElementById('totals-container'); if(!cont) return;
  const items=currentBudget.items;
  const moNeto =items.filter(i=>i.type==='mo').reduce((s,i)=>s+subtotal(i),0);
  const matNeto=items.filter(i=>i.type==='mat').reduce((s,i)=>s+subtotal(i),0);
  const moCost =items.filter(i=>i.type==='mo').reduce((s,i)=>s+(parseFloat(i.cost)||0)*(parseFloat(i.qty)||0),0);
  const matCost=items.filter(i=>i.type==='mat').reduce((s,i)=>s+(parseFloat(i.cost)||0)*(parseFloat(i.qty)||0),0);
  const neto=moNeto+matNeto, costTotal=moCost+matCost;
  const iva=neto*IVA, total=neto+iva;
  const mg=neto>0?(neto-costTotal)/neto*100:0;
  const mc=mg>=30?'var(--green)':mg>=10?'var(--accent)':'var(--red)';

  cont.innerHTML=`<div class="totals-box">
    ${moNeto>0?`<div class="totals-row"><span class="label">Mano de obra</span><span class="amount">${fmtARS(moNeto)}</span></div>`:''}
    ${matNeto>0?`<div class="totals-row"><span class="label">Materiales</span><span class="amount">${fmtARS(matNeto)}</span></div>`:''}
    <div class="totals-row"><span class="label">Subtotal neto</span><span class="amount">${fmtARS(neto)}</span></div>
    ${costTotal>0?`<div class="totals-row">
      <span class="label">Margen bruto estimado</span>
      <span style="font-family:'Barlow Condensed';font-size:15px;font-weight:700;color:${mc}">${mg.toFixed(1)}% · ${fmtARS(neto-costTotal)}</span>
    </div>`:''}
    <div class="totals-row"><span class="label">IVA <span class="iva-tag">21%</span></span><span class="amount">${fmtARS(iva)}</span></div>
    <div class="totals-row total-final"><span class="label">TOTAL</span><span class="amount">${fmtARS(total)}</span></div>
  </div>`;
}

function updateField(f,v){ currentBudget[f]=v; save(); renderSidebar(); }
function getClientHistory(){
  // Obtener clientes únicos con todos sus datos del último presupuesto
  const map = {};
  [...budgets].sort((a,b)=>b.date.localeCompare(a.date)).forEach(b=>{
    const name = b.client?.name?.trim();
    if(name && !map[name]) map[name] = {...b.client};
  });
  return Object.values(map);
}

// Cache para sugerencias de clientes
let _clientSuggestionsCache = [];

function showClientSuggestions(val){
  const box = document.getElementById('client-suggestions');
  if(!box) return;
  const q = val.trim().toLowerCase();
  if(!q){ box.style.display='none'; return; }
  const matches = getClientHistory().filter(c=>c.name.toLowerCase().includes(q));
  if(!matches.length){ box.style.display='none'; return; }
  _clientSuggestionsCache = matches;
  box.innerHTML = matches.map((c,i)=>`
    <div onclick="fillClientByIndex(${i})"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s"
      onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
      <div style="font-weight:600;font-size:13px;color:var(--text)">${esc(c.name)}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">
        ${c.cuit?'CUIT '+esc(c.cuit)+' &nbsp;·&nbsp; ':''}${c.condition||''}${c.address?' &nbsp;·&nbsp; '+esc(c.address):''}
      </div>
    </div>`).join('');
  box.style.display='block';
}

function hideClientSuggestions(){
  const box = document.getElementById('client-suggestions');
  if(box) box.style.display='none';
}

function fillClientByIndex(i){
  const c = _clientSuggestionsCache[i];
  if(!c) return;
  // Pisar TODOS los campos explícitamente, incluso los vacíos
  currentBudget.client = {

// ═══════════════════════════════════════════
//  CÁLCULO CENTRAL — usar en rentabilidad, estadísticas y cashflow
// ═══════════════════════════════════════════
function calcBudgetRentabilidad(b){
  const items = b.items||[];
  const {neto, iva, total} = calcTotals(items);
  const moNeto  = items.filter(i=>i.type==='mo' ).reduce((s,i)=>s+subtotal(i),0);
  const matNeto = items.filter(i=>i.type==='mat').reduce((s,i)=>s+subtotal(i),0);
  const moCosto = items.filter(i=>i.type==='mo' ).reduce((s,i)=>s+(parseFloat(i.cost)||0)*(parseFloat(i.qty)||0),0);
  const matCosto= items.filter(i=>i.type==='mat').reduce((s,i)=>s+(parseFloat(i.cost)||0)*(parseFloat(i.qty)||0),0);

  // ── MARGEN DE ENTRADA ──────────────────────────────────────────────────────
  // (neto − costo real MO − costo compra materiales) / neto
  // Es la ganancia bruta antes de impuestos y cargas
  const margenBruto   = neto - moCosto - matCosto;
  const margenEntrada = neto > 0 ? (margenBruto / neto * 100) : 0;

  // ── IVA (informativo) ──────────────────────────────────────────────────────
  // El IVA es neutro para el RI: lo cobra al cliente y lo transfiere a AFIP.
  // El crédito fiscal de compras de materiales reduce lo que deposita.
  // NO afecta el resultado operativo (no se resta del neto).
  const ivaVentas  = iva;                    // débito fiscal (21% sobre neto)
  const ivaCompras = matCosto * 0.21;        // crédito fiscal compras (mat a RI)
  const ivaReal    = ivaVentas - ivaCompras; // lo que efectivamente deposita a AFIP

  // ── INGRESOS BRUTOS ────────────────────────────────────────────────────────
  // Base: ventas netas de IVA (el neto). Alícuota configurable (def. 3.5%)
  const impIIBB = neto * (rentConfig.iibb / 100);

  // ── CARGAS SOCIALES ────────────────────────────────────────────────────────
  // moCosto ya incluye todas las cargas (patronales, ART, sindicatos, SAC, etc.)
  // porque vienen del Costo HH donde están cargados como conceptos.
  // NO se calculan por separado — hacerlo sería doble conteo.
  // Se mantienen como variables en cero para no romper referencias en el display.
  const base          = moCosto;
  const totalPatronal = 0;
  const totalAportes  = 0;
  const costoArt      = 0;
  const totalCargas   = 0;

  // ── IMPUESTO A LAS GANANCIAS ───────────────────────────────────────────────
  // Deducibles: moCosto (incluye cargas), matCosto, IIBB, imprevistos, otros
  // Base imponible = margenBruto − IIBB − imprevistos − otros
  // (moCosto ya fue deducido al calcular margenBruto = neto − moCosto − matCosto)
  const imprevMat     = matNeto * (rentConfig.mat_markup / 100);
  const impOtr        = neto * (rentConfig.otros / 100);
  const baseGanancias = Math.max(0, margenBruto - impIIBB - imprevMat - impOtr);
  const impGanancias  = baseGanancias * (rentConfig.ganancias / 100);

  const totalImp = impIIBB + impGanancias + impOtr;

  // ── RESULTADO Y MARGEN DE SALIDA ───────────────────────────────────────────
  // moCosto ya lleva adentro cargas, ART, sindicatos, SAC — no sumar nada extra
  const totalCostos = moCosto + matCosto + impIIBB + impGanancias + impOtr + imprevMat;
  const resultado   = neto - totalCostos;
  const margenSalida = neto > 0 ? (resultado / neto * 100) : 0;

  // Cashflow: total factura menos retenciones si es agente
  const esAgente = !!b.agente_retencion;
  const retIVA       = esAgente ? iva   * (retConfig.iva_pct/100)       : 0;
  const retGanancias = esAgente ? total * (retConfig.ganancias_pct/100)  : 0;
  const retSUSS      = esAgente ? neto  * (retConfig.suss_pct/100)       : 0;
  const retIIBB      = esAgente ? neto  * (retConfig.iibb_pct/100)       : 0;
  const retARBA      = esAgente ? neto  * (retConfig.arba_pct/100)       : 0;
  const retDebito    = esAgente ? total * (retConfig.debito_pct/100)     : 0;
  const retCredito   = esAgente ? total * (retConfig.credito_pct/100)    : 0;
  const totalRet     = retIVA+retGanancias+retSUSS+retIIBB+retARBA+retDebito+retCredito;
  const cashflow     = total - totalRet;

  return {
    neto, iva, total, moNeto, matNeto, moCosto, matCosto,
    margenEntrada, margenSalida, margenBruto,
    ivaVentas, ivaCompras, ivaReal,
    baseGanancias, impGanancias, impIIBB, impOtr, totalImp,
    totalPatronal, totalAportes, costoArt, totalCargas,
    imprevMat, totalCostos, resultado,
    cashflow, totalRet, esAgente
  };
}

function renderEjecucion(){

  const moCosto   = (b.items||[]).filter(i=>i.type==='mo' ).reduce((s,i)=>s+(parseFloat(i.cost)||0)*(parseFloat(i.qty)||0),0);

function agregarFotos(input){
  const files = Array.from(input.files);
  if(!files.length) return;
  if(!currentBudget.adjuntos) currentBudget.adjuntos = {fotos:[], links:[]};

  let pending = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      // Compress image via canvas
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 1200;
        let w = img.width, h = img.height;
        if(w > MAX){ h = Math.round(h * MAX/w); w = MAX; }
        if(h > MAX){ w = Math.round(w * MAX/h); h = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const data = canvas.toDataURL('image/jpeg', 0.75);
        currentBudget.adjuntos.fotos.push({ nombre: file.name, data, size: 2 });
        pending--;
        if(pending === 0){ save(); renderAdjuntos(); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function setFotoSize(idx, size){
  if(!currentBudget.adjuntos || !currentBudget.adjuntos.fotos[idx]) return;
  currentBudget.adjuntos.fotos[idx].size = size;
  save(); renderAdjuntos();
}

function removeAdjuntoFoto(idx){
  if(!confirm('¿Quitar esta foto?')) return;
  currentBudget.adjuntos.fotos.splice(idx, 1);
  save(); renderAdjuntos();
}

function agregarLink(){
  const nombre = document.getElementById('nuevo-link-nombre')?.value.trim();
  const url    = document.getElementById('nuevo-link-url')?.value.trim();
  if(!nombre){ alert('Ingresá un nombre para el documento.'); return; }
  if(!url || !url.startsWith('http')){ alert('Ingresá una URL válida de Google Drive.'); return; }
  if(!currentBudget.adjuntos) currentBudget.adjuntos = {fotos:[], links:[]};
  currentBudget.adjuntos.links.push({ nombre, url });
  save(); renderAdjuntos();
}

function removeAdjuntoLink(idx){
  if(!confirm('¿Quitar este link?')) return;
  currentBudget.adjuntos.links.splice(idx, 1);
  save(); renderAdjuntos();
}

function renderCashflow(){
  const cont = document.getElementById('tab-content');
  const b = currentBudget;
  const {neto, iva, total} = calcTotals(b.items||[]);
  const fmt = v => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:2}).format(v);
  const esAgente = !!b.agente_retencion;

  const retIVA       = esAgente ? iva   * (retConfig.iva_pct/100)       : 0;
  const retGanancias = esAgente ? total * (retConfig.ganancias_pct/100)  : 0;
  const retSUSS      = esAgente ? neto  * (retConfig.suss_pct/100)       : 0;
  const retIIBB      = esAgente ? neto  * (retConfig.iibb_pct/100)       : 0;
  const retARBA      = esAgente ? neto  * (retConfig.arba_pct/100)       : 0;
  const retDebito    = esAgente ? total * (retConfig.debito_pct/100)     : 0;
  const retCredito   = esAgente ? total * (retConfig.credito_pct/100)    : 0;
  const totalRet     = retIVA+retGanancias+retSUSS+retIIBB+retARBA+retDebito+retCredito;
  const netoDeposito = total - totalRet;
  const anticipoPct  = b.anticipo||0;
  const montoAnticipo = total * (anticipoPct/100);
  const depositoSaldo = (total - montoAnticipo) - (esAgente ? totalRet : 0);

  const row    = (lbl,v,color,bold)=>`<div class="rent-result-row"><span class="lbl" style="${bold?'font-weight:700':'color:'+color}">${lbl}</span><span class="val" style="color:${color||'var(--text2)'};${bold?'font-weight:700':''}">${fmt(v)}</span></div>`;
  const rowRet = (lbl,v,id='')=>`<div class="rent-result-row" style="padding-left:14px;font-size:12px"><span class="lbl" style="color:var(--text3)">${lbl}</span><span class="val" ${id?'id="'+id+'"':''} style="color:var(--red);font-size:13px">− ${fmt(v)}</span></div>`;

  let retHTML = esAgente ? `

      <div style="font-size:11px;color:var(--accent);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">⚠️ Retenciones del cliente</div>

      ${rowRet('SUSS ('+retConfig.suss_pct+'% s/neto)', retSUSS, 'cf-ret-suss')}
      ${rowRet('IIBB ('+retConfig.iibb_pct+'% s/neto)', retIIBB, 'cf-ret-iibb')}
      ${rowRet('ARBA banco ('+retConfig.arba_pct+'% s/neto)', retARBA, 'cf-ret-arba')}
      ${rowRet('Débito ('+retConfig.debito_pct+'% s/total)', retDebito, 'cf-ret-deb')}
      ${rowRet('Crédito ('+retConfig.credito_pct+'% s/total)', retCredito, 'cf-ret-cred')}
      <div class="rent-result-row" style="margin-top:4px">
        <span class="lbl" style="font-weight:700">Total retenciones</span>
        <span class="val" id="cf-ret-total" style="color:var(--red);font-weight:700">− ${fmt(totalRet)}</span>

        <span style="color:var(--text2)">Saldo al entregar</span>
        <span id="cf-saldo" style="color:var(--green);font-weight:700">${fmt(depositoSaldo)}</span>
      </div>
    </div>` : '';

  const alicuotas = [
    ['IVA (% del IVA)', 'iva_pct'],
    ['Ganancias (% s/total)', 'ganancias_pct'],
    ['SUSS (% s/neto)', 'suss_pct'],
    ['IIBB (% s/neto)', 'iibb_pct'],
    ['ARBA banco (% s/neto)', 'arba_pct'],
    ['Débito (% s/total)', 'debito_pct'],
    ['Crédito (% s/total)', 'credito_pct'],
  ];

  cont.innerHTML = `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="rent-result">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:12px">📄 Composición del cobro</div>
      ${row('Neto facturado', neto, 'var(--text)', false)}
      ${row('IVA 21%', iva, 'var(--text2)', false)}

        <div id="ret-inputs"></div>

  alicuotas.forEach(([lbl, key]) => {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px';

    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = '0.1'; inp.min = '0';
    inp.value = retConfig[key];
    inp.dataset.retkey = key;
    inp.style.cssText = 'width:70px;text-align:right;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px';
    inp.addEventListener('input', () => {
      retConfig[key] = +inp.value||0;
      saveRetConfig();
      refreshCashflow();
    });
    div.appendChild(span); div.appendChild(inp);
    retInputsContainer.appendChild(div);
  });

function refreshCashflow(){
  const activeKey = document.activeElement?.dataset?.retkey || null;
  renderCashflow();
  if(activeKey){
    const el = document.querySelector('[data-retkey="'+activeKey+'"]');
    if(el){ el.focus(); el.select(); }
  }
}
